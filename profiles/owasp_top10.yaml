# Xfweb OWASP Top 10 Profile
# Focused on OWASP Top 10 2021 vulnerabilities

scan:
  discovery_timeout: 3600
  scan_timeout: 7200
  max_threads: 30

plugins:
  crawl:
    - web_spider
    - robots_txt
    - sitemap_xml
    - open_api
    - dir_listing

  audit:
    - sqli
    - xss
    - csrf
    - lfi
    - rfi
    - os_commanding
    - ssrf
    - eval
    - xxe

  grep:
    - csp
    - credit_cards
    - get_emails
    - html_comments
    - password_profiling

  infrastructure:
    - server_header
    - fingerprint_os
    - fingerprint_waf

  evasion:
    - x_forwarded_for

  output:
    - sarif_output
    - json_output

  graphql:
    - graphql_introspection

  websocket:
    - websocket_hijacking

  auth:
    - jwt_attacks

  bruteforce: []
  attack: []
  mangle: []
  api: []
  ai: []
